regulation:
  name: "EU AI Act"
  version: "2024"
  risk_factors:
    - id: "biometric_identification"
      label: "Real-time remote biometric identification in public spaces"
      severity: "prohibited"
    - id: "critical_infrastructure"
      label: "Management and operation of critical infrastructure"
      severity: "high"
    - id: "employment_decisions"
      label: "AI used in recruitment or employment decisions"
      severity: "high"
    - id: "education_scoring"
      label: "AI that determines access to education or vocational training"
      severity: "high"
    - id: "emotion_recognition"
      label: "Emotion recognition in workplace or educational institutions"
      severity: "limited"
    - id: "deepfake_generation"
      label: "Generation of deepfake content"
      severity: "limited"
    - id: "spam_filtering"
      label: "AI-enabled spam filtering"
      severity: "minimal"
  prohibited_uses:
    - "Social scoring by public authorities"
    - "Subliminal manipulation techniques that distort behavior"
    - "Exploitation of vulnerabilities of specific groups"
    - "Real-time remote biometric identification in public spaces (with narrow exceptions)"
    - "Untargeted scraping of facial images from the internet"
  required_documents:
    - "Conformity assessment report"
    - "Technical documentation (Annex IV)"
    - "EU Declaration of Conformity"
    - "Instructions for use"
    - "Post-market monitoring plan"
    - "Fundamental rights impact assessment (for high-risk systems)"
  compliance_questions:
    - id: "q1"
      text: "Does the system perform real-time remote biometric identification?"
      maps_to: "biometric_identification"
    - id: "q2"
      text: "Is the system used to manage critical infrastructure such as water, gas, or electricity networks?"
      maps_to: "critical_infrastructure"
    - id: "q3"
      text: "Does the system make or influence employment-related decisions (hiring, promotion, termination)?"
      maps_to: "employment_decisions"
    - id: "q4"
      text: "Does the system determine access to educational institutions or assign grades?"
      maps_to: "education_scoring"
    - id: "q5"
      text: "Does the system infer emotional states of individuals in workplace or educational settings?"
      maps_to: "emotion_recognition"
    - id: "q6"
      text: "Can the system generate synthetic media (deepfakes) of real people without consent?"
      maps_to: "deepfake_generation"
